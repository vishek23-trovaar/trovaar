version: "3.8"

services:
  app:
    build: .
    ports:
      - "3001:3001"
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_PATH=/app/data/servicerequest.db
    volumes:
      # Persist SQLite database across container restarts
      - db-data:/app/data
      # Persist uploaded files (remove if using S3)
      - uploads:/app/public/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  db-data:
  uploads:
